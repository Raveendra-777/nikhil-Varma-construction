  <meta property="og:url" content="https://www.nikhilvarmaconstruction.com/">
  <meta property="og:image" content="https://www.nikhilvarmaconstruction.com/download.ico">

  <title>Residential Construction Bangalore — Nikhil Varma Constructions</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #333;
      background: #fff;
    }

    header {
      background: linear-gradient(90deg, #d32f2f, #f57c00);
      color: white;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header img {
      height: 60px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: url('construction-bg.jpg') center/cover no-repeat;
      color: white;
    }

    .hero h1 {
      font-size: 48px;
      margin: 0;
      color: #d32f2f;
    }

    .hero p {
      font-size: 20px;
      color: #d32f2f;
    }

    .section {
      padding: 60px 20px;
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: #fafafa;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h3 {
      color: #d32f2f;
    }

    footer {
      background: #363636;
      color: white;
      text-align: center;
      padding: 20px;
    }

    footer a {
      color: #ff9800;
      text-decoration: none;
      margin: 0 10px;
      font-weight: 500;
    }

    footer a:hover {
      color: #d32f2f;
      text-decoration: underline;
    }

    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    #preloader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .lego-preloader {
      display: flex;
      gap: 10px;
    }

    .brick {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      animation: bounce 1s infinite alternate;
    }

    .brick.red { background: #d32f2f; animation-delay: 0s; }
    .brick.blue { background: #1976d2; animation-delay: 0.2s; }
    .brick.yellow { background: #fbc02d; animation-delay: 0.4s; }
    .brick.green { background: #388e3c; animation-delay: 0.6s; }

    @keyframes bounce {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>

<body>

<div id="preloader">
  <div class="lego-preloader">
    <div class="brick red"></div>
    <div class="brick blue"></div>
    <div class="brick yellow"></div>
    <div class="brick green"></div>
  </div>
</div>

<script>
  window.addEventListener('load', () => {
    const preloader = document.getElementById('preloader');
    preloader.classList.add('hidden');
  });
</script>

</body>
</html>
